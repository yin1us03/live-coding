# ══════════════════════════════════════════════════════════════════════════════
# nginx.conf — ZonaChat.net
# Headers de seguridad HTTP + proxy al backend Flask
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Headers de seguridad (se aplican a todas las rutas) ─────────────────

    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' http://localhost:3000; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
        always;

    add_header X-Frame-Options        "DENY"                            always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Proxy al backend Flask ───────────────────────────────────────────────
    # 'api' es el nombre del servicio en docker-compose.
    location /api/ {
        proxy_pass         http://api:5000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;

        # No cachear respuestas de la API
        add_header Cache-Control "no-store" always;
    }

    # ── Archivos estáticos (CSS, JS, imágenes) ───────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2|woff|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Bloquear acceso a archivos ocultos (.env, .git, etc.) ───────────────
    location ~ /\. {
        deny   all;
        return 404;
    }

    # ── HTML: sin caché para que los headers CSP siempre estén actualizados ─
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' http://localhost:3000; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
            always;
        add_header X-Frame-Options        "DENY"                            always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=()" always;
    }

    # ── Páginas de error personalizadas ─────────────────────────────────────
    error_page 404              /404.html;
    error_page 403              /403.html;
    error_page 500 502 503 504  /404.html;

    location = /404.html {
        internal;
        add_header Cache-Control "no-store" always;
    }

    location = /403.html {
        internal;
        add_header Cache-Control "no-store" always;
    }

    # ── Fallback SPA ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}