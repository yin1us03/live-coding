<!DOCTYPE html>
<html lang="es">
<head>
<script>
    (function(){
        const d = localStorage.getItem('zonachat_dark');
        const sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (d === '1' || (d === null && sys)) document.documentElement.classList.add('dark');
    })();
</script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZonaChat.net — Hilo</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' http://localhost:3000; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="zonachat-toast-container"></div>
<nav class="glass-nav"><div class="container nav-wrapper">
    <a href="index.html" class="logo">Zona<span>Chat.net</span></a>
    <div class="nav-links">
        <a href="salas.html">🏠 Salas</a>
        <a href="perfil.html">👤 Mi Perfil</a>
    </div>
    <div id="auth-controls">
        <button id="nav-login-btn" onclick="location.href='index.html'">Acceder</button>
        <button id="nav-perfil-btn" onclick="location.href='perfil.html'" style="display:none"></button>
        <button id="nav-mod-btn" class="btn-warn btn-small" onclick="location.href='moderacion.html'" style="display:none">🛡 Mod</button>
        <button id="nav-logout-btn" class="btn-danger btn-small" style="display:none" onclick="cerrarSesion()">Salir</button>
    </div>
</div>        <button class="dark-toggle" onclick="toggleModoOscuro()" title="Cambiar modo">
            <span class="toggle-icon">🌙</span>
            <span class="toggle-label">Modo oscuro</span>
        </button>
</nav>

<main class="container">
    <!-- Info de la sala -->
    <div class="glass-card">
        <div class="win-titlebar">
            <span id="sala-titulo">💬 Cargando sala...</span>
            <a href="salas.html" style="color: var(--neon-cyan); font-size: 12px;">← Volver a salas</a>
        </div>
        <div class="card-body" style="padding: 10px 16px;">
            <p id="sala-descripcion" style="font-size: 13px; color: var(--text-dim); margin: 0;"></p>
        </div>
    </div>

    <!-- Botón nuevo hilo -->
    <div id="nuevo-hilo-section" class="glass-card" style="display: none;">
        <div class="card-body">
            <button class="btn-primary" onclick="mostrarFormNuevoHilo()" style="width: auto;">✏️ Crear nuevo hilo</button>
        </div>
    </div>

    <!-- Formulario nuevo hilo -->
    <div id="form-nuevo-hilo" class="glass-card" style="display: none;">
        <div class="win-titlebar"><span>✏️ Nuevo Hilo de Discusión</span></div>
        <div class="card-body">
            <form onsubmit="crearHilo(event)">
                <div class="input-group">
                    <label for="hilo-titulo">Título *</label>
                    <input type="text" id="hilo-titulo" maxlength="100" placeholder="Título del hilo..." required>
                </div>
                <div class="input-group">
                    <label for="hilo-contenido">Mensaje inicial *</label>
                    <textarea id="hilo-contenido" maxlength="2000" rows="4" placeholder="Escribe tu mensaje..." required></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" onclick="ocultarFormNuevoHilo()">Cancelar</button>
                    <button type="submit" class="btn-primary"> Publicar hilo</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lista de hilos -->
    <div class="glass-card">
        <div class="win-titlebar"><span>📋 Hilos de discusión</span></div>
        <div id="hilos-contenedor" style="padding: 12px;">
            <!-- Hilos se cargan aquí -->
        </div>
        <div class="card-body d-flex justify-between align-center" style="border-top: 1px solid rgba(0,255,255,0.15);">
            <div class="paginacion" id="paginacion"></div>
            <span id="paginacion-info" class="paginacion-info"></span>
        </div>
    </div>
</main>

<script src="shared.js"></script>
<script>
'use strict';
let salaActual = null;
let usuarioActual = null;
let hilos = [];
let pagina = 1;
const POR_PAG = 10;

// Obtener ID de sala de la URL
const urlParams = new URLSearchParams(window.location.search);
const salaId = parseInt(urlParams.get('sala')) || 1;

window.addEventListener('DOMContentLoaded', () => {
    iniciarSesionGuardada(u => {
        usuarioActual = u;
        renderizarNavbar(u);
        document.getElementById('nuevo-hilo-section').style.display = 'block';
    }, () => {
        renderizarNavbar(null);
    });

    cargarSala();
    cargarHilos();
});

async function cargarSala() {
    try {
        const res = await apiFetch(`/salas/${salaId}`);
        if (res.ok) {
            const data = await res.json();
            salaActual = data.sala;
            document.getElementById('sala-titulo').textContent = `${salaActual.icono || '💬'} ${salaActual.nombre}`;
            document.getElementById('sala-descripcion').textContent = salaActual.descripcion || '';
            document.title = `${salaActual.nombre} — ZonaChat.net`;
        } else {
            // Fallback a datos mock
            const salaMock = MOCK.salas.find(s => s.id === salaId);
            if (salaMock) {
                salaActual = salaMock;
                document.getElementById('sala-titulo').textContent = `${salaMock.icono} ${salaMock.nombre}`;
                document.getElementById('sala-descripcion').textContent = salaMock.descripcion;
            }
        }
    } catch (error) {
        // Fallback a datos mock
        const salaMock = MOCK.salas.find(s => s.id === salaId);
        if (salaMock) {
            salaActual = salaMock;
            document.getElementById('sala-titulo').textContent = `${salaMock.icono} ${salaMock.nombre}`;
            document.getElementById('sala-descripcion').textContent = salaMock.descripcion;
        }
    }
}

async function cargarHilos() {
    const contenedor = document.getElementById('hilos-contenedor');
    contenedor.innerHTML = '<p style="text-align: center; color: var(--text-dim); padding: 20px;">Cargando hilos...</p>';

    try {
        const res = await apiFetch(`/mensajes?sala=${salaId}`);
        if (res.ok) {
            const data = await res.json();
            hilos = data.mensajes || [];
        } else {
            // Fallback a datos mock
            hilos = MOCK.hilos.filter(h => h.salaId === salaId);
        }
    } catch (error) {
        // Fallback a datos mock
        hilos = MOCK.hilos.filter(h => h.salaId === salaId);
    }

    if (hilos.length === 0) {
        contenedor.innerHTML = '<p style="text-align: center; color: var(--text-dim); padding: 20px;">No hay hilos en esta sala. ¡Sé el primero en crear uno!</p>';
        document.getElementById('paginacion').innerHTML = '';
        document.getElementById('paginacion-info').textContent = '';
        return;
    }

    renderHilos();
}

function renderHilos() {
    const contenedor = document.getElementById('hilos-contenedor');
    contenedor.innerHTML = '';

    const inicio = (pagina - 1) * POR_PAG;
    const slice = hilos.slice(inicio, inicio + POR_PAG);

    slice.forEach(hilo => {
        const card = document.createElement('div');
        card.className = 'mensaje-card';
        card.style.cursor = 'pointer';
        card.onclick = () => location.href = `hilo.html?sala=${salaId}&hilo=${hilo.id}`;

        const header = document.createElement('div');
        header.className = 'mensaje-header';

        const avatar = document.createElement('div');
        avatar.className = 'avatar avatar-sm';
        avatar.textContent = (hilo.autor || '?')[0].toUpperCase();

        const autor = document.createElement('span');
        autor.className = 'mensaje-autor';
        autor.textContent = `@${hilo.autor}`;

        const fecha = document.createElement('span');
        fecha.className = 'mensaje-fecha';
        fecha.textContent = formatearFecha(hilo.fecha || hilo.creado_en);

        header.append(avatar, autor, fecha);

        const titulo = document.createElement('h4');
        titulo.style.cssText = 'margin: 8px 0; color: var(--text-bright); font-size: 14px;';
        titulo.textContent = hilo.titulo || 'Sin título';

        const contenido = document.createElement('p');
        contenido.className = 'mensaje-contenido';
        contenido.textContent = truncar(hilo.contenido, 150);

        const stats = document.createElement('div');
        stats.style.cssText = 'display: flex; gap: 16px; margin-top: 10px; font-size: 11px; color: var(--text-dim);';
        stats.innerHTML = `
            <span>💬 ${hilo.respuestas ? hilo.respuestas.length : 0} respuestas</span>
            <span>👁 ${hilo.vistas || 0} vistas</span>
            <span>👍 ${hilo.votos || 0} votos</span>
        `;

        card.append(header, titulo, contenido, stats);
        contenedor.appendChild(card);
    });

    renderPaginacion();
}

function renderPaginacion() {
    const total = Math.ceil(hilos.length / POR_PAG);
    const cont = document.getElementById('paginacion');
    const info = document.getElementById('paginacion-info');
    cont.innerHTML = '';

    if (total <= 1) {
        info.textContent = `${hilos.length} hilo${hilos.length !== 1 ? 's' : ''}`;
        return;
    }

    const prev = document.createElement('button');
    prev.textContent = '◄';
    prev.className = 'btn-small';
    prev.disabled = pagina === 1;
    prev.onclick = () => { pagina--; renderHilos(); };
    cont.appendChild(prev);

    for (let i = 1; i <= total; i++) {
        const b = document.createElement('button');
        b.textContent = i;
        b.className = `btn-small${i === pagina ? ' activa' : ''}`;
        b.onclick = () => { pagina = i; renderHilos(); };
        cont.appendChild(b);
    }

    const next = document.createElement('button');
    next.textContent = '►';
    next.className = 'btn-small';
    next.disabled = pagina === total;
    next.onclick = () => { pagina++; renderHilos(); };
    cont.appendChild(next);

    const inicio = (pagina - 1) * POR_PAG + 1;
    const fin = Math.min(pagina * POR_PAG, hilos.length);
    info.textContent = `Mostrando ${inicio}–${fin} de ${hilos.length}`;
}

function mostrarFormNuevoHilo() {
    if (!usuarioActual) {
        mostrarAviso('Debes iniciar sesión para crear un hilo.', 'error');
        return;
    }
    document.getElementById('form-nuevo-hilo').style.display = 'block';
    document.getElementById('hilo-titulo').focus();
}

function ocultarFormNuevoHilo() {
    document.getElementById('form-nuevo-hilo').style.display = 'none';
    document.getElementById('hilo-titulo').value = '';
    document.getElementById('hilo-contenido').value = '';
}

async function crearHilo(e) {
    e.preventDefault();

    const titulo = document.getElementById('hilo-titulo').value.trim();
    const contenido = document.getElementById('hilo-contenido').value.trim();

    if (!titulo || !contenido) {
        mostrarAviso('Completa todos los campos.', 'error');
        return;
    }

    try {
        const res = await apiFetch('/mensajes', {
            method: 'POST',
            body: JSON.stringify({
                sala_id: salaId,
                titulo,
                contenido
            })
        });

        if (res.ok) {
            mostrarAviso('Hilo creado correctamente.', 'success');
            ocultarFormNuevoHilo();
            cargarHilos();
        } else {
            const data = await res.json();
            mostrarAviso(data.error || 'Error al crear hilo.', 'error');
        }
    } catch (error) {
        mostrarAviso('Error de conexión.', 'error');
    }
}
</script>
<script>document.addEventListener("DOMContentLoaded", inicializarModoOscuro);</script>
</body></html>
