<script src="shared.js"></script>
<script>
'use strict';
const params = new URLSearchParams(location.search);
const salaIdUrl = parseInt(params.get('sala')) || 1;
const hiloIdUrl = parseInt(params.get('hilo')) || null;

let hiloActivo = null;
let hilos = [];
let usuarioActual = null;

window.addEventListener('DOMContentLoaded', () => {
    iniciarSesionGuardada(u => {
        usuarioActual = u;
        renderizarNavbar(u);
        if (u) document.getElementById('btn-nuevo-hilo').style.display = 'inline-block';
    }, () => renderizarNavbar(null));
    cargarSala();
    cargarOnline();
});

// ── Sala ──────────────────────────────────────────────────────────────────────
async function cargarSala() {
    try {
        // Cargar info de la sala
        const salasRes = await apiFetch('/salas');
        if (salasRes.ok) {
            const salasData = await salasRes.json();
            const sala = salasData.salas.find(s => s.id === salaIdUrl) || salasData.salas[0];
            if (sala) {
                document.getElementById('titulo-sala').textContent = `${sala.icono} ${sala.nombre}`;
                document.getElementById('bc-sala').textContent = sala.nombre;
                document.title = `ZonaChat.net — ${sala.nombre}`;
            }
        }

        // Cargar hilos de la sala
        const hilosRes = await apiFetch(`/mensajes?sala_id=${salaIdUrl}&limite=50`);
        if (hilosRes.ok) {
            const data = await hilosRes.json();
            hilos = data.mensajes;
            renderListaHilos();
            
            if (hilos.length > 0) {
                const hiloInicial = hiloIdUrl ? hilos.find(h => h.id === hiloIdUrl) : hilos[0];
                if (hiloInicial) cargarHilo(hiloInicial.id);
            }
        } else {
            usarDatosMock();
        }
    } catch (error) {
        console.log('Usando datos mock');
        usarDatosMock();
    }
}

function usarDatosMock() {
    const sala = MOCK.salas.find(s => s.id === salaIdUrl) || MOCK.salas[0];
    document.getElementById('titulo-sala').textContent = `${sala.icono} ${sala.nombre}`;
    document.getElementById('bc-sala').textContent = sala.nombre;
    
    hilos = MOCK.hilos.filter(h => h.salaId === sala.id).map(h => ({
        id: h.id,
        titulo: h.titulo,
        autor: h.autor,
        fecha: h.fecha,
        respuestas: h.respuestas.length,
        contenido: h.contenido
    }));
    
    renderListaHilos();
    if (hilos.length > 0) cargarHiloMock(hilos[0].id);
}

function renderListaHilos() {
    const tbody = document.getElementById('lista-hilos');
    tbody.innerHTML = '';

    if (!hilos.length) {
        const tr = tbody.insertRow();
        const td = tr.insertCell();
        td.colSpan = 2;
        td.textContent = 'No hay hilos aún. ¡Crea el primero!';
        td.style.cssText = 'padding:12px;text-align:center;color:var(--text-system)';
        return;
    }

    hilos.forEach(hilo => {
        const tr = tbody.insertRow();
        tr.className = 'hilo-item';
        tr.onclick = () => cargarHilo(hilo.id);

        const tdTit = tr.insertCell();
        const span = document.createElement('span');
        span.textContent = truncar(hilo.titulo || 'Sin título', 40);
        span.style.fontWeight = 'bold';
        span.style.color = 'var(--terra-blue-dark)';
        const autor = document.createElement('div');
        autor.textContent = `@${hilo.autor} · ${formatearFecha(hilo.fecha)}`;
        autor.style.cssText = 'font-size:9px;color:var(--text-system)';
        tdTit.appendChild(span);
        tdTit.appendChild(autor);

        const tdResp = tr.insertCell();
        tdResp.textContent = hilo.respuestas || 0;
        tdResp.style.cssText = 'text-align:center;color:var(--text-system)';
    });
}

// ── Hilo ──────────────────────────────────────────────────────────────────────
async function cargarHilo(id) {
    try {
        const res = await apiFetch(`/mensajes/${id}`);
        if (res.ok) {
            const hilo = await res.json();
            hiloActivo = hilo;
            renderHilo(hilo);
        } else {
            cargarHiloMock(id);
        }
    } catch (error) {
        cargarHiloMock(id);
    }
}

function cargarHiloMock(id) {
    const hilo = MOCK.hilos.find(h => h.id === id);
    if (!hilo) return;
    
    hiloActivo = {
        id: hilo.id,
        titulo: hilo.titulo,
        autor: hilo.autor,
        autor_rol: 'usuario',
        fecha: hilo.fecha,
        contenido: hilo.contenido,
        votos: 0,
        respuestas: hilo.respuestas.map(r => ({
            id: r.id,
            autor: r.autor,
            autor_rol: r.moderador ? 'moderador' : 'usuario',
            fecha: r.fecha,
            contenido: r.contenido,
            votos: r.votos
        }))
    };
    renderHilo(hiloActivo);
}

function renderHilo(hilo) {
    document.getElementById('titulo-hilo').textContent = truncar(hilo.titulo || 'Sin título', 60);
    document.getElementById('bc-hilo').textContent = truncar(hilo.titulo || 'Sin título', 40);

    const cuerpo = document.getElementById('cuerpo-hilo');
    cuerpo.innerHTML = '';

    // Mensaje original
    cuerpo.appendChild(crearTarjetaMensaje({
        id: hilo.id,
        autor: hilo.autor,
        autor_rol: hilo.autor_rol,
        fecha: hilo.fecha,
        contenido: hilo.contenido,
        votos: hilo.votos || 0,
        esOriginal: true
    }));

    // Stats
    const stats = document.createElement('div');
    stats.className = 'hilo-stats mt-4 mb-8';
    stats.innerHTML = `<span>💬 ${hilo.respuestas ? hilo.respuestas.length : 0} respuestas</span>`;
    cuerpo.appendChild(stats);

    const sep = document.createElement('hr');
    sep.className = 'separator';
    cuerpo.appendChild(sep);

    // Respuestas
    if (!hilo.respuestas || hilo.respuestas.length === 0) {
        const p = document.createElement('p');
        p.className = 'text-small';
        p.style.padding = '8px 0';
        p.textContent = 'Sé el primero en responder.';
        cuerpo.appendChild(p);
    } else {
        hilo.respuestas.forEach(r => {
            cuerpo.appendChild(crearTarjetaMensaje(r));
        });
    }

    // Botón responder
    if (usuarioActual) {
        const btnResp = document.createElement('button');
        btnResp.textContent = '✏️ Responder al hilo';
        btnResp.className = 'mt-8';
        btnResp.onclick = () => mostrarFormRespuesta(null);
        cuerpo.appendChild(btnResp);
    }

    document.getElementById('panel-responder').style.display = 'none';
    cancelarRespuesta();
}

function crearTarjetaMensaje(r) {
    const card = document.createElement('div');
    card.className = `post-card${r.esOriginal ? '' : ' respuesta-anidada'}`;

    const header = document.createElement('div');
    header.className = 'post-header';

    const av = document.createElement('div');
    av.className = 'avatar avatar-sm';
    av.textContent = (r.autor || '?')[0].toUpperCase();

    const nombre = document.createElement('strong');
    nombre.textContent = `@${r.autor}`;

    const fecha = document.createElement('span');
    fecha.className = 'fecha';
    fecha.textContent = formatearFecha(r.fecha);

    if (r.autor_rol === 'moderador' || r.autor_rol === 'admin') {
        const badge = document.createElement('span');
        badge.className = 'badge-mod';
        badge.textContent = r.autor_rol === 'admin' ? 'ADMIN' : 'MOD';
        header.appendChild(badge);
    }
    header.append(av, nombre, fecha);

    if (r.esOriginal) {
        const badgeOP = document.createElement('span');
        badgeOP.style.cssText = 'font-size:9px;background:#003399;color:#fff;padding:1px 5px;margin-left:2px';
        badgeOP.textContent = 'OP';
        header.appendChild(badgeOP);
    }

    const content = document.createElement('div');
    content.className = 'post-content mt-4';
    content.textContent = r.contenido;

    const acciones = document.createElement('div');
    acciones.className = 'post-actions';

    const btnVotar = document.createElement('button');
    btnVotar.className = 'btn-small';
    btnVotar.textContent = `▲ ${r.votos || 0}`;
    btnVotar.title = 'Votar mensaje';
    btnVotar.onclick = () => votarMensaje(r.id, btnVotar);

    const btnCitar = document.createElement('button');
    btnCitar.className = 'btn-small';
    btnCitar.textContent = '↩ Citar';
    btnCitar.title = 'Citar este mensaje';
    btnCitar.onclick = () => {
        if (!usuarioActual) { mostrarAviso('Debes iniciar sesión.', 'error'); return; }
        mostrarFormRespuesta(r);
    };

    const btnReportar = document.createElement('button');
    btnReportar.className = 'btn-small btn-warn';
    btnReportar.textContent = '⚑ Reportar';
    btnReportar.onclick = () => {
        if (!usuarioActual) { mostrarAviso('Debes iniciar sesión.', 'error'); return; }
        abrirModalReportar(r.id);
    };

    acciones.append(btnVotar, btnCitar, btnReportar);

    // Borrar (solo mod/admin o autor, no en mensaje original)
    if (!r.esOriginal && usuarioActual) {
        const esAutor = r.autor === usuarioActual.nombre;
        const esMod = usuarioActual.rol === 'moderador' || usuarioActual.rol === 'admin';
        if (esAutor || esMod) {
            const btnBorrar = document.createElement('button');
            btnBorrar.className = 'btn-small btn-danger';
            btnBorrar.textContent = '🗑 Borrar';
            btnBorrar.onclick = () => borrarMensaje(r.id);
            acciones.appendChild(btnBorrar);
        }
    }

    card.append(header, content, acciones);
    return card;
}

async function votarMensaje(mensajeId, btn) {
    if (!usuarioActual) {
        mostrarAviso('Debes iniciar sesión para votar.', 'error');
        return;
    }
    
    try {
        const res = await apiFetch(`/mensajes/${mensajeId}/votar`, { method: 'POST' });
        if (res.ok) {
            const data = await res.json();
            btn.textContent = `▲ ${data.votos}`;
            mostrarAviso('Voto registrado.', 'success');
        }
    } catch (error) {
        mostrarAviso('Error al votar.', 'error');
    }
}

async function borrarMensaje(mensajeId) {
    if (!confirm('¿Estás seguro de que quieres borrar este mensaje?')) return;
    
    try {
        const res = await apiFetch(`/mensajes/${mensajeId}`, { method: 'DELETE' });
        if (res.ok) {
            mostrarAviso('Mensaje eliminado.', 'success');
            if (hiloActivo) cargarHilo(hiloActivo.id);
        } else {
            const err = await res.json();
            mostrarAviso(err.error || 'Error al borrar.', 'error');
        }
    } catch (error) {
        mostrarAviso('Error al borrar.', 'error');
    }
}

// ── Formulario respuesta ──────────────────────────────────────────────────────
let citandoId = null;

function mostrarFormRespuesta(citado) {
    citandoId = citado ? citado.id : null;
    const panel = document.getElementById('panel-responder');
    const preview = document.getElementById('cita-preview');
    const textarea = document.getElementById('texto-respuesta');

    if (citado) {
        preview.classList.remove('hidden');
        preview.textContent = `Citando a @${citado.autor}: "${truncar(citado.contenido, 80)}"`;
        document.getElementById('titulo-responder').textContent = `↩ Respondiendo a @${citado.autor}`;
    } else {
        preview.classList.add('hidden');
        document.getElementById('titulo-responder').textContent = '✏️ Responder al hilo';
    }

    panel.style.display = 'block';
    textarea.value = '';
    textarea.focus();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.addEventListener('DOMContentLoaded', () => {
    const ta = document.getElementById('texto-respuesta');
    if (ta) ta.addEventListener('input', () => {
        document.getElementById('char-count').textContent = `${ta.value.length} / 2000 caracteres`;
    });
});

function cancelarRespuesta() {
    citandoId = null;
    const ta = document.getElementById('texto-respuesta');
    if (ta) ta.value = '';
    document.getElementById('cita-preview').classList.add('hidden');
}

async function enviarRespuesta() {
    if (!usuarioActual) { mostrarAviso('Debes iniciar sesión.', 'error'); return; }
    if (!hiloActivo) { mostrarAviso('Selecciona un hilo primero.', 'error'); return; }

    const ta = document.getElementById('texto-respuesta');
    const texto = ta.value.trim();
    if (!texto) { mostrarAviso('El mensaje no puede estar vacío.', 'error'); return; }
    if (texto.length > 2000) { mostrarAviso('El mensaje es demasiado largo.', 'error'); return; }

    try {
        const res = await apiFetch('/mensajes', {
            method: 'POST',
            body: JSON.stringify({
                contenido: texto,
                padre_id: hiloActivo.id
            })
        });

        if (res.ok) {
            mostrarAviso('Respuesta publicada.', 'success');
            cargarHilo(hiloActivo.id);
            document.getElementById('panel-responder').style.display = 'none';
        } else {
            const err = await res.json();
            mostrarAviso(err.error || 'Error al publicar.', 'error');
        }
    } catch (error) {
        mostrarAviso('Error al publicar respuesta.', 'error');
    }
}

// ── Nuevo hilo ────────────────────────────────────────────────────────────────
function abrirModalHilo() { document.getElementById('modal-hilo').classList.remove('hidden'); }
function cerrarModalHilo() { document.getElementById('modal-hilo').classList.add('hidden'); }

async function confirmarNuevoHilo() {
    if (!usuarioActual) { mostrarAviso('Debes iniciar sesión.', 'error'); return; }
    const titulo = document.getElementById('nh-titulo').value.trim();
    const cuerpo = document.getElementById('nh-cuerpo').value.trim();
    if (!titulo) { mostrarAviso('El título es obligatorio.', 'error'); return; }
    if (!cuerpo) { mostrarAviso('El mensaje inicial es obligatorio.', 'error'); return; }

    try {
        const res = await apiFetch('/mensajes', {
            method: 'POST',
            body: JSON.stringify({
                titulo,
                contenido: cuerpo,
                sala_id: salaIdUrl
            })
        });

        if (res.ok) {
            const data = await res.json();
            mostrarAviso('Hilo creado correctamente.', 'success');
            cerrarModalHilo();
            document.getElementById('nh-titulo').value = '';
            document.getElementById('nh-cuerpo').value = '';
            cargarSala();
        } else {
            const err = await res.json();
            mostrarAviso(err.error || 'Error al crear hilo.', 'error');
        }
    } catch (error) {
        mostrarAviso('Error al crear hilo.', 'error');
    }
}

// ── Reporte ────────────────────────────────────────────────────────────────────
let reportandoMsgId = null;
function abrirModalReportar(id) {
    reportandoMsgId = id;
    document.getElementById('modal-reportar').classList.remove('hidden');
}
function cerrarModalReportar() { document.getElementById('modal-reportar').classList.add('hidden'); }

async function confirmarReporte() {
    const motivo = document.getElementById('reporte-motivo').value;
    const comentario = document.getElementById('reporte-comentario').value.trim();
    
    try {
        const res = await apiFetch('/reportes', {
            method: 'POST',
            body: JSON.stringify({
                tipo: 'mensaje',
                objetivo_id: reportandoMsgId,
                razon: motivo + (comentario ? `: ${comentario}` : '')
            })
        });

        if (res.ok) {
            cerrarModalReportar();
            mostrarAviso('Reporte enviado. El equipo de moderación lo revisará.', 'success');
        } else {
            mostrarAviso('Error al enviar reporte.', 'error');
        }
    } catch (error) {
        cerrarModalReportar();
        mostrarAviso('Reporte enviado (modo offline).', 'success');
    }
}

// ── Online ─────────────────────────────────────────────────────────────────────
async function cargarOnline() {
    const cont = document.getElementById('lista-online');
    
    try {
        const res = await apiFetch('/usuarios/online');
        if (res.ok) {
            const data = await res.json();
            cont.innerHTML = '';
            data.usuarios.forEach(u => {
                const div = document.createElement('div');
                div.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px dotted #ccc;font-size:11px';
                const dot = document.createElement('span');
                dot.className = 'dot-online';
                const av = document.createElement('div');
                av.className = 'avatar avatar-sm';
                av.textContent = u.nombre[0].toUpperCase();
                const nom = document.createElement('span');
                nom.textContent = u.nombre;
                
                if (u.rol === 'moderador') {
                    const b = document.createElement('span');
                    b.className = 'badge-mod';
                    b.textContent = 'MOD';
                    div.append(dot, av, nom, b);
                } else if (u.rol === 'admin') {
                    const b = document.createElement('span');
                    b.className = 'badge-admin';
                    b.textContent = 'ADMIN';
                    div.append(dot, av, nom, b);
                } else {
                    div.append(dot, av, nom);
                }
                cont.appendChild(div);
            });
        }
    } catch (error) {
        // Fallback mock
        cont.innerHTML = '';
        MOCK.usuarios.filter(u => u.estado === 'online').forEach(u => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px dotted #ccc;font-size:11px';
            const dot = document.createElement('span');
            dot.className = 'dot-online';
            const av = document.createElement('div');
            av.className = 'avatar avatar-sm';
            av.textContent = u.nombre[0].toUpperCase();
            const nom = document.createElement('span');
            nom.textContent = u.nombre;
            div.append(dot, av, nom);
            cont.appendChild(div);
        });
    }
}
</script>
<script>document.addEventListener("DOMContentLoaded", inicializarModoOscuro);</script>
</body></html>
