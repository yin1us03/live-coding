# ══════════════════════════════════════════════════════════════════════════════
# ZonaChat.net — docker-compose.yml
#
# PARA ARRANCAR:
#   1. cd mi-proyecto
#   2. Genera SECRET_KEY:
#      - Windows: python -c "import secrets; print('SECRET_KEY=' + secrets.token_hex(32))" > .env
#      - Linux/Mac: echo "SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_hex(32))')" > .env
#   3. Crear directorio: mkdir backend\data  (Windows) o mkdir -p backend/data (Linux/Mac)
#   4. docker-compose up --build
#   5. Accede a: http://localhost:8080
#
# NOTA: El nginx.conf se copia dentro de la imagen via Dockerfile para evitar
#       problemas de montaje en Windows/Docker Desktop.
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Backend Flask ─────────────────────────────────────────────────────────
  api:
    build: ./backend
    ports:
      - "127.0.0.1:3000:5000"
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - SECRET_KEY=${SECRET_KEY:-cambia_esto_por_una_clave_segura}
      - DATABASE_URL=sqlite:////app/data/foro.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - zonachat-net
    restart: unless-stopped

  # ── Frontend Nginx ────────────────────────────────────────────────────────
  web:
    build: ./frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - zonachat-net
    restart: unless-stopped

# ── Red interna ───────────────────────────────────────────────────────────
networks:
  zonachat-net:
    driver: bridge