# ══════════════════════════════════════════════════════════════════════════════
# nginx.conf — AeroForum
# Headers de seguridad HTTP + proxy al backend Flask
# ══════════════════════════════════════════════════════════════════════════════
#
# En docker-compose este archivo se monta como:
#   ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
#
# Los servicios se comunican por nombre de red Docker:
#   nginx → api:5000   (nombre del servicio en docker-compose)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Headers de seguridad (se aplican a todas las rutas) ─────────────────

    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
        always;

    add_header X-Frame-Options        "DENY"                            always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HSTS — descomentar solo cuando tengas HTTPS en producción:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy al backend Flask ───────────────────────────────────────────────
    # 'api' es el nombre del servicio en docker-compose.
    # Docker DNS resuelve 'api' a la IP interna del contenedor automáticamente.
    location /api/ {
        proxy_pass         http://api:5000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para evitar que peticiones colgadas bloqueen nginx
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;

        # No cachear respuestas de la API
        add_header Cache-Control "no-store" always;
    }

    # ── Archivos estáticos (CSS, JS, imágenes) ───────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2)$ {
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Bloquear acceso a archivos ocultos (.env, .git, etc.) ───────────────
    location ~ /\. {
        deny   all;
        return 404;
    }

    # ── HTML: sin caché para que los headers CSP siempre estén actualizados ─
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        # Repetir headers porque un bloque location sobreescribe los del server
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
            always;
        add_header X-Frame-Options        "DENY"                            always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=()" always;
    }

    # ── Fallback SPA ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

    # ── Páginas de error personalizadas ─────────────────────────────────────
    # nginx sirve estas páginas automáticamente cuando el backend
    # o el propio nginx devuelven los códigos de error correspondientes.
    error_page 404              /404.html;
    error_page 403              /403.html;
    error_page 500 502 503 504  /404.html;   # Fallback genérico para errores de servidor

    location = /404.html {
        internal;   # Solo accesible internamente, no directamente por URL
        add_header Cache-Control "no-store" always;
    }
    location = /403.html {
        internal;
        add_header Cache-Control "no-store" always;
    }